services:
  postgres:
    image: postgres:17.10
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 127.0.0.1:5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready', '-d', 'forkflow-api']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - forkflow-api-data:/var/lib/postgresql/data
    networks:
      - forkflow-api-network

  adminer:
    image: adminer:5.4.2
    restart: always
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - 127.0.0.1:8080:8080
    networks:
      - forkflow-api-network

volumes:
  forkflow-api-data:
    name: forkflow-api-data

networks:
  forkflow-api-network:
    name: forkflow-api-network
