services:
  postgres:
    image: postgres:17.10
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 127.0.0.1:5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready', '-d', 'forkflow']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - forkflow-network

networks:
  forkflow-network:
    name: forkflow-network
